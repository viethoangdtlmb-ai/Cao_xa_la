      {label:&#x27;Ký HĐMB&#x27;,note:&#x27;(Dự kiến T10/2026, trong 30 ngày)&#x27;,date:fd(&#x27;2026-10-31&#x27;),pct:10,badgeCls:&#x27;bn&#x27;,isBank:false},

      {label:&#x27;Bàn giao — đóng KPBT 2%&#x27;,note:&#x27;(Dự kiến Q2/2029)&#x27;,date:fd(&#x27;2029-06-30&#x27;),pct:0,addKpbt:true,badgeCls:&#x27;bo&#x27;,isBank:false},
    ];
  } else {
    rows=[
      xndk,
      {label:&#x27;Ký Thỏa Thuận&#x27;,note:kytt_note,date:addDays(startStr,7),pct:10,deduct:0.05,badgeCls:&#x27;bn&#x27;,isBank:false},
      {label:&#x27;Không muộn hơn 30/09/2026&#x27;,note:&#x27;&#x27;,date:fd(&#x27;2026-09-30&#x27;),pct:10,badgeCls:&#x27;bn&#x27;,isBank:false},
      {label:&#x27;Ký HĐMB&#x27;,note:&#x27;(Dự kiến T10/2026, trong 30 ngày)&#x27;,date:fd(&#x27;2026-10-31&#x27;),pct:10,badgeCls:&#x27;bn&#x27;,isBank:false},
      {label:&#x27;Thanh toán sớm 70%&#x27;,note:&#x27;Áp dụng giá TTS (chiết khấu CĐT)&#x27;,date:fd(&#x27;2026-11-30&#x27;),pct:70,badgeCls:&#x27;bo&#x27;,isBank:false},
      {label:&#x27;Bàn giao — đóng KPBT 2%&#x27;,note:&#x27;(Dự kiến Q2/2029)&#x27;,date:fd(&#x27;2029-06-30&#x27;),pct:0,addKpbt:true,badgeCls:&#x27;bo&#x27;,isBank:false},
    ];
  }
  var tbody=document.getElementById(&#x27;tbody&#x27;);
  tbody.innerHTML=&#x27;&#x27;;
  var cumPct=0, selfTotal=0;
  rows.forEach(function(r,i){
    var amt, pctLabel;
    if(r.fixedAmt!==undefined){
      amt=r.fixedAmt; pctLabel=&#x27;50tr&#x27;; selfTotal+=amt;
    } else {
      amt=(r.pct/100)*P;
      if(r.deduct) amt-=r.deduct;
      pctLabel=r.pct+&#x27;%&#x27;;
      if(!r.isBank) selfTotal+=amt;
      cumPct+=r.pct;
    }
    if(r.addKpbt){ 
      amt+=KPBT; selfTotal+=KPBT; cumPct+=2; 
      pctLabel = r.pct === 0 ? &#x27;2%&#x27; : r.pct + &#x27;% + 2%&#x27;;
    }
    var isLast=(i===rows.length-1);
    var noteHtml=r.note?&#x27;&lt;br&gt;&lt;span class=&quot;mc&quot;&gt;&#x27;+r.note+&#x27;&lt;/span&gt;&#x27;:&#x27;&#x27;;
    var amtDisplay=(r.fixedAmt!==undefined)?&#x27;0.050&#x27;:fmtNum(amt);
    var tr=makeRow([
      {html:String(i+1)},
      {html:&#x27;&lt;strong&gt;&#x27;+r.label+&#x27;&lt;/strong&gt;&#x27;+noteHtml},
      {html:fmtDate(r.date)},
      {html:&#x27;&lt;span class=&quot;bdg &#x27;+r.badgeCls+&#x27;&quot;&gt;&#x27;+pctLabel+&#x27;&lt;/span&gt;&#x27;},
      {html:amtDisplay,cls:&#x27;amc&#x27;},
      {html:cumPct&gt;0?cumPct+&#x27;%&#x27;:&#x27;—&#x27;,cls:&#x27;mc&#x27;},
    ],isLast?&#x27;tr-last&#x27;:&#x27;&#x27;);
    tbody.appendChild(tr);
  });
  var pNames={standard:&#x27;Tiến độ chuẩn&#x27;,loan:&#x27;Vay HTLS 70%&#x27;,early:&#x27;Thanh toán sớm&#x27;};
  var selfLabel=pol===&#x27;loan&#x27;?&#x27;Vốn tự có phải nộp&#x27;:&#x27;Tổng tiền phải nộp&#x27;;
  var sg=document.getElementById(&#x27;sumGrid&#x27;);
  sg.innerHTML=&#x27;&#x27;;
  [{label:&#x27;Giá trị căn hộ&#x27;,val:fmtNum(priceVal)+&#x27; tỷ&#x27;,cls:&#x27;&#x27;},
   {label:&#x27;KPBT (2%)&#x27;,val:fmtNum(KPBT)+&#x27; tỷ&#x27;,cls:&#x27;gold&#x27;},
   {label:&#x27;Phương thức&#x27;,val:pNames[pol],cls:&#x27;&#x27;},
   {label:selfLabel,val:fmtNum(selfTotal)+&#x27; tỷ&#x27;,cls:&#x27;green&#x27;},
   {label:&#x27;Bàn giao dự kiến&#x27;,val:&#x27;Q2/2029&#x27;,cls:&#x27;&#x27;},
   {label:&#x27;Tổng số đợt&#x27;,val:String(rows.length),cls:&#x27;&#x27;},
  ].forEach(function(it){
    var d=document.createElement(&#x27;div&#x27;);
    d.className=&#x27;si &#x27;+it.cls;
    d.innerHTML=&#x27;&lt;div class=&quot;sl&quot;&gt;&#x27;+it.label+&#x27;&lt;/div&gt;&lt;div class=&quot;sv&quot;&gt;&#x27;+it.val+&#x27;&lt;/div&gt;&#x27;;
    sg.appendChild(d);
  });
  var lb=document.getElementById(&#x27;loanBox&#x27;);
  if(pol===&#x27;loan&#x27;){
    var loanAmt=P*0.70;
    lb.innerHTML=&#x27;&lt;div class=&quot;loan-card&quot;&gt;&lt;h3&gt;&amp;#127974; Chi tiết gói vay HTLS 70%&lt;/h3&gt;&lt;div class=&quot;lgrid&quot;&gt;&#x27;
      +&#x27;&lt;div class=&quot;li&quot;&gt;&lt;div class=&quot;ll&quot;&gt;Ngân hàng giải ngân (70%)&lt;/div&gt;&lt;div class=&quot;lv&quot;&gt;&#x27;+fmtNum(loanAmt)+&#x27; tỷ&lt;/div&gt;&lt;/div&gt;&#x27;
      +&#x27;&lt;div class=&quot;li&quot;&gt;&lt;div class=&quot;ll&quot;&gt;Vốn tự có phải chuẩn bị&lt;/div&gt;&lt;div class=&quot;lv&quot;&gt;&#x27;+fmtNum(selfTotal)+&#x27; tỷ&lt;/div&gt;&lt;/div&gt;&#x27;
      +&#x27;&lt;div class=&quot;li&quot;&gt;&lt;div class=&quot;ll&quot;&gt;HTLS trong xây dựng&lt;/div&gt;&lt;div class=&quot;lv&quot;&gt;0% + Ân hạn gốc&lt;/div&gt;&lt;/div&gt;&#x27;
      +&#x27;&lt;div class=&quot;li&quot;&gt;&lt;div class=&quot;ll&quot;&gt;Lãi suất sau bàn giao&lt;/div&gt;&lt;div class=&quot;lv&quot;&gt;7.5%/năm (CĐ 24 tháng)&lt;/div&gt;&lt;/div&gt;&#x27;
      +&#x27;&lt;div class=&quot;li&quot;&gt;&lt;div class=&quot;ll&quot;&gt;Trả gốc/tháng (20 năm)&lt;/div&gt;&lt;div class=&quot;lv&quot;&gt;&#x27;+fmtNum(loanAmt/240)+&#x27; tỷ&lt;/div&gt;&lt;/div&gt;&#x27;
      +&#x27;&lt;div class=&quot;li&quot;&gt;&lt;div class=&quot;ll&quot;&gt;Gốc + lãi tháng đầu&lt;/div&gt;&lt;div class=&quot;lv&quot;&gt;&#x27;+fmtNum(loanAmt/240+loanAmt*0.075/12)+&#x27; tỷ&lt;/div&gt;&lt;/div&gt;&#x27;
      +&#x27;&lt;/div&gt;&lt;/div&gt;&#x27;;
  } else { lb.innerHTML=&#x27;&#x27;; }
  document.getElementById(&#x27;result&#x27;).style.display=&#x27;block&#x27;;
  document.getElementById(&#x27;result&#x27;).scrollIntoView({behavior:&#x27;smooth&#x27;,block:&#x27;start&#x27;});
}
&lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;
"></iframe>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));

            if (tab === 'bg') {
                document.querySelectorAll('.nav-btn')[0].classList.add('active');
                document.getElementById('frame-bg').classList.add('active');
            } else {
                document.querySelectorAll('.nav-btn')[1].classList.add('active');
                document.getElementById('frame-tt').classList.add('active');
            }
        }
    </script>
